name: Real-Time Scraper

on:
  schedule:
    - cron: '15 6,10,13 * * *'   # 2:15 PM, 5:15 PM, 9:15 PM PHT (UTC+8)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # Install Chrome
      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
      
      # Install only puppeteer-core (no Chromium download)
      - run: npm install puppeteer-core
      
      # Run the scraper
      - run: node realtimeScraper.js
      
      # Upload results.json via FTP
      - name: Upload results.json via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-file: ./results.json
          remote-file: /public_html/staging/results.json
